<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIAcceleratedRetirement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* Global Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            color: #fff;
        }

        /* Hero Section Styles */
        .hero-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: linear-gradient(to right, #2ecc71, #3498db);
            text-align: center;
        }

        .hero-section h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        /* Bento Grid Styles */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 40px;
        }

        .card {
            background-color: #333;
            padding: 20px;
            border: 1px solid #555;
            border-radius: 10px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }

        .card:hover {
            background-color: #444;
            transform: translateY(-5px);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.3);
        }

        /* Service Card Styles */
        .service-card {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 150px;
            background-color: #333;
            padding: 10px;
            border: 1px solid #555;
            border-radius: 10px;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.1);
        }

        .service-card h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .bento-grid {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <h1>Automate. Scale. Dominate.</h1>
    </div>

    <div class="bento-grid">
        <div class="card service-card">
            <div class="service-card">
                <h2>Shadow QA</h2>
                <p>Automate your testing process with AI-powered Shadow QA.</p>
            </div>
        </div>

        <div class="card service-card">
            <div class="service-card">
                <h2>Logistics AI</h2>
                <p>Optimize your logistics operations with our AI-driven solutions.</p>
            </div>
        </div>

        <div class="card service-card">
            <div class="service-card">
                <h2>Accounting</h2>
                <p>Streamline your accounting processes with our AI-powered tools.</p>
            </div>
        </div>
    </div>

    <script>
        // JavaScript code here
    </script>
</body>
</html>
